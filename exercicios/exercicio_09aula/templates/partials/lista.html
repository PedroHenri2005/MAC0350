<input type="text"  
       name="busca" 
       placeholder="Buscar..."
       hx-get="/lista"
       hx-target="#lista-container"
       hx-trigger="input changed delay:500ms"
       hx-select="#lista-container"
       value="{{ busca }}">

<div id="lista-container">
    <div id="lista">
        <ul>
            {% for aluno in alunos %}
                <li>{{ aluno.id }} - {{ aluno.nome }}</li>
            {% else %}
                <li>Não há alunos</li>
            {% endfor %}
        </ul>
    </div>
    
    <div>
        <button hx-get="/lista?pagina={{ pagina - 1 }}&busca={{ busca }}"
                hx-target="#lista-container"
                hx-select="#lista-container"
                {% if pagina <= 1 %}
                    disabled class="botao_desabilitado"
                {% endif %}>
            Anterior
        </button>
        
        <button hx-get="/lista?pagina={{ pagina + 1 }}&busca={{ busca }}"
                hx-target="#lista-container"
                hx-select="#lista-container"
                {% if pagina >= total_paginas %}
                    disabled class="botao_desabilitado"
                {% endif %}>
            Próximo
        </button>
    </div>
</div>
