<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.js" integrity="sha384-ezjq8118wdwdRMj+nX4bevEi+cDLTbhLAeFF688VK8tPDGeLUe0WoY2MZtSla72F" crossorigin="anonymous"></script>
    <style>
        button:disabled, 
        button.botao_desabilitado {
            opacity: 0.8;
        }
        .fade-out.htmx-swapping {
            opacity: 0;
            transition: opacity 1s ease-out;
        }
    </style>
</head>
<body class="fade-out">
    <h1>Meu Site</h1>
    <p>Bem vindo ao meu site!</p>
    
    <nav>
        <button hx-get="/lista"
                hx-target="main">
            Lista de alunos
        </button>
        <button hx-get="/editarAlunos"
                hx-target="main">
            Editar lista de alunos
        </button>
        <button hx-delete="/apagar"
                hx-target="body"
                hx-confirm="Deseja deletar meu site?"
                hx-swap="outerHTML swap:1s">
            Deletar site
        </button>
    </nav>
    
    <hr>
    
    <main hx-get="/lista"
          hx-target="main"
          hx-trigger="load">
    </main>
</body>
</html>
