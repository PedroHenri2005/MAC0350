<div class="form-vertical">
    <h1 style="color: green">Editar Deck</h1>
    
    <form hx-put="/atualizar_deck/{{ deck.decks_id }}" hx-target="#conteudo">
        <div class="form-grupo">
            <label for="tema">Novo Nome do Tema:</label>
            <input type="text" name="tema" id="tema" value="{{ deck.tema }}" required>
        </div>

        <div class="form-grupo">
            <label for="descricao">Nova Descrição:</label>
            <input type="text" name="descricao" id="descricao" value="{{ deck.descricao if deck.descricao else '' }}">
        </div>

        <button type="submit" class="botao-salvar">
            Salvar Alterações
        </button>
    </form>
</div>
