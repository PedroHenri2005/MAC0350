<div class="formulario-container">
    <h1 style="color: blue">Novo Flashcard</h1>
    
    <form hx-post="/salvar_card" hx-target="#conteudo" class="form-vertical">
        <input type="hidden" name="deck_id" value="{{ deck_id }}">

        <div class="form-grupo">
            <label><h2>Kanji:</h2></label>
            <input type="text" name="kanji" required placeholder="Ex: 食べる">
        </div>

        <div class="form-grupo">
            <label><h2>Tradução:</h2></label>
            <input type="text" name="traducao" required placeholder="Ex: Comer">
        </div>    

        <div class="form-grupo">
            <label><h2>Frase de Exemplo:</h2></label>
            <input type="text" name="frase" required placeholder="Ex: りんごを食べる。">
        </div>

        <div class="form-grupo">
            <label><h2>Nível (1 a 5):</h2></label>
            <input type="number" name="nivel" min="1" max="5" value="1" required>
        </div>    

        <div class="form-grupo">
            <button type="submit" class="botao-salvar">
                Salvar Flashcard
            </button>
        </div>
    </form>
</div>
